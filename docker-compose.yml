services:
  maximus-telegram:
    build: .
    container_name: maximus-telegram
    restart: always
    env_file:
      - .env
    user: "999:999"
    group_add:
      - "989"
    volumes:
      - /root/.openclaude-creds:/app/.openclaude-creds:ro
      - /root/.codex-creds:/app/.codex-creds:ro
      - /root/.openclaude/projects/-root/memory:/app/.openclaude/projects/-app/memory:ro
      - /root/maximus-data:/app/data
      - /root/maximus-sessions:/app/.claude
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/agents:/host-agents
      - /root/.openclaude/plugins:/app/.openclaude/plugins
    tmpfs:
      - /app/tmp:uid=999,gid=999
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - agents-net

networks:
  agents-net:
    name: agents-net
    external: true
