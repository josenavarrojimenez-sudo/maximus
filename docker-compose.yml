services:
  maximus-telegram:
    build: .
    container_name: maximus-telegram
    restart: always
    env_file:
      - .env
    user: "999:999"
    volumes:
      - /root/.openclaude/.credentials.json:/app/.openclaude/.credentials.json
      - /root/maximus-data:/app/data
    tmpfs:
      - /app/tmp:uid=999,gid=999
